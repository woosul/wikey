# wikey.conf — 로컬 검색 파이프라인 설정
#
# wikey-query.sh가 이 파일을 읽어 검색 동작을 결정한다.
# 환경변수로 오버라이드 가능 (예: WIKEY_SEARCH_BACKEND=gemma4 ./local-llm/wikey-query.sh "질문")

# 검색 backend 선택
#   basic  : qmd 내장 파이프라인 (확장 1.7B + 검색 + 리랭킹 0.6B) → Gemma 4 합성
#            빠름 (~1초 캐시), 영어/엔티티 정확, 한국어 약함
#   gemma4 : Gemma 4 확장 → qmd 검색만 (--no-rerank) → Gemma 4 리랭킹+합성
#            느림 (~15초), 한국어 정확
WIKEY_SEARCH_BACKEND=basic

# Ollama 모델명 (합성 + gemma4 backend의 확장/리랭킹에 사용)
WIKEY_MODEL=wikey

# qmd 검색 결과 수
WIKEY_QMD_TOP_N=5
