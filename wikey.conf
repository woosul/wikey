# wikey.conf — 통합 설정 (단일 소스)
#
# CLI 스크립트와 Obsidian 플러그인이 이 파일을 공유한다.
# 환경변수로 오버라이드 가능 (예: WIKEY_SEARCH_BACKEND=gemma4 ./local-llm/wikey-query.sh "질문")
# 우선순위: 환경변수 > wikey.conf > 하드코딩 기본값
#
# API 키는 ~/.config/wikey/credentials.json에 저장된다.
# 플러그인 설정 > API 키에서 설정하거나, 직접 파일 생성:
#   mkdir -p ~/.config/wikey
#   echo '{"geminiApiKey":"AIza..."}' > ~/.config/wikey/credentials.json
#
# 상세 가이드: local-llm/model-selection-guide.md

# ─────────────────────────────────────────────
# 기본 모델 (이 한 줄로 모든 클라우드 프로세스 결정)
# ─────────────────────────────────────────────

# claude-code : Claude Pro/Max 구독자 (에이전트 세션, 스크립트는 ANTHROPIC_API_KEY 폴백)
# codex       : OpenAI API 사용자 (에이전트 + 스크립트 모두 가능)
# gemini      : 저가/무료 사용자 (스크립트 인제스트, 1M 컨텍스트)
# ollama      : 완전 오프라인 (Gemma 4, 품질 제한)
WIKEY_BASIC_MODEL=gemini

# ─────────────────────────────────────────────
# 검색 파이프라인 (wikey-query.sh)
# ─────────────────────────────────────────────

# 검색 backend 선택
#   basic  : qmd 내장 파이프라인 (확장 1.7B + 검색 + 리랭킹 0.6B) → Gemma 4 합성
#            빠름 (~1초 캐시), 영어/엔티티 정확, 한국어 약함
#   gemma4 : Gemma 4 확장 → qmd 검색만 (--no-rerank) → Gemma 4 리랭킹+합성
#            느림 (~15초), 한국어 정확
WIKEY_SEARCH_BACKEND=basic

# Ollama 모델명 (합성 + gemma4 backend의 확장/리랭킹에 사용)
WIKEY_MODEL=gemini-2.5-flash

# qmd 검색 결과 수 (Phase 5 §5.2.4: 5 → 8 — 답변 풍부도 quick win, prompt 토큰·LLM cost 영향 측정 후 조정)
WIKEY_QMD_TOP_N=8

# ─────────────────────────────────────────────
# Contextual Retrieval (contextual-retrieval.py)
# ─────────────────────────────────────────────

# Ollama 모델 (맥락 프리픽스 생성용)
CONTEXTUAL_MODEL=gemma4

# ─────────────────────────────────────────────
# 대용량 PDF 요약 (summarize-large-source.sh)
# ─────────────────────────────────────────────

# 요약 프로바이더: gemini (API) | ollama (로컬)
SUMMARIZE_PROVIDER=gemini

# Gemini 모델 (SUMMARIZE_PROVIDER=gemini일 때)
GEMINI_MODEL=gemini-2.5-flash

# ─────────────────────────────────────────────
# 고급: 프로세스별 오버라이드
# (비어 있으면 WIKEY_BASIC_MODEL 따름)
# ─────────────────────────────────────────────

# INGEST_PROVIDER=gemini           # 인제스트 프로바이더 오버라이드
# LINT_PROVIDER=codex              # 린트 프로바이더 오버라이드
# SUMMARIZE_PROVIDER=gemini        # 대용량 요약 프로바이더 오버라이드

# §4.2.3 Stage 3 S3-2: classify 는 파일명+경로만 보므로 저가 모델로 충분.
# 미지정 시 INGEST_PROVIDER(없으면 WIKEY_BASIC_MODEL) 승계. MODEL 만 따로 override 도 가능.
# CLASSIFY_PROVIDER=gemini         # e.g. gemini / openai / anthropic / ollama
# CLASSIFY_MODEL=gemini-2.0-flash-lite   # 저가 모델 예시 (gpt-4o-mini, claude-haiku 등)

# Claude Code 모델 (BASIC_MODEL=claude-code일 때): opus | sonnet
INGEST_MODEL=opus

# ─────────────────────────────────────────────
# qmd 내장 모델 (GGUF — 고급 설정, 변경 불필요)
# ─────────────────────────────────────────────

# 아래 주석을 해제하면 qmd 기본 모델을 교체할 수 있다.
# QMD_EMBED_MODEL=hf:Qwen/Qwen3-Embedding-0.6B-GGUF/Qwen3-Embedding-0.6B-Q8_0.gguf
# QMD_RERANK_MODEL=hf:ggml-org/Qwen3-Reranker-0.6B-Q8_0-GGUF/qwen3-reranker-0.6b-q8_0.gguf
# QMD_GENERATE_MODEL=hf:tobil/qmd-query-expansion-1.7B-gguf/qmd-query-expansion-1.7B-q4_k_m.gguf

# ─────────────────────────────────────────────
# 데이터 경로 (고급 설정)
# ─────────────────────────────────────────────

# WIKI_DIR=wiki
OLLAMA_URL=http://localhost:11434

# ─────────────────────────────────────────────
# 비용 관리
# ─────────────────────────────────────────────

# 월 비용 한도 (USD)
COST_LIMIT=50

# ─────────────────────────────────────────────
# Docling (tier 1 메인 컨버터 — Phase 4.1.1)
# ─────────────────────────────────────────────

# 설치: uv tool install docling  → ~/.local/bin/docling
# HWP/HWPX 는 unhwp 로 위임 (pip install unhwp). 미설치 시 MarkItDown fallback.

# 표 구조 복원 모드: accurate (기본, TableFormer 정확) | fast
# DOCLING_TABLE_MODE=accurate

# 가속 장치: mps (macOS Apple Silicon 자동), cuda (NVIDIA), cpu
# DOCLING_DEVICE=mps

# OCR 엔진 — platform fallback (§4.1.3):
#   - macOS: ocrmac (Apple Vision, ANE 가속, 한국어 우수)
#   - Linux/Windows: rapidocr (paddleOCR Korean PP-OCRv5 모델 내장)
#   - 명시 설정이 없으면 platform 에 따라 자동 선택.
# DOCLING_OCR_ENGINE=ocrmac

# OCR 언어 — engine 별 형식이 다름 (docling 공식 소스 확증):
#   - ocrmac:    BCP-47        예) ko-KR,en-US
#   - rapidocr:  언어명         예) korean,english  (paddleOCR 모델)
#   - easyocr:   ISO 639-1     예) ko,en
#   - tesseract: ISO 639-2     예) kor,eng
# DOCLING_OCR_ENGINE 만 설정하면 해당 engine 의 기본 lang 이 자동 적용됨.
# 이 값을 명시 설정 시 엔진과 형식이 맞는지 확인 필요.
# DOCLING_OCR_LANG=ko-KR,en-US

# 변환 타임아웃 (ms)
# DOCLING_TIMEOUT_MS=300000

# 디버깅/벤치마크: tier 1 docling 스킵하고 MarkItDown fallback 강제
# DOCLING_DISABLE=true
