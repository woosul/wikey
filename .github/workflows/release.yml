name: Release Obsidian Plugin

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - run: npm run build

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            wikey-obsidian/main.js
            wikey-obsidian/manifest.json
            wikey-obsidian/styles.css
